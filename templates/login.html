{% extends "base.html" %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card fade-in">
        <div class="auth-header">
            <i class="fa-solid fa-wheat-awn neon-logo"></i>
            <h2>Smart<span>Bakery</span></h2>
            <p>Access your AI bakery operations panel</p>
        </div>
        
        <form action="{{ url_for('login') }}" method="POST" class="auth-form">
            <div class="form-group">
                <label for="email"><i class="fa-regular fa-envelope"></i> Email Address</label>
                <input type="email" id="email" name="email" placeholder="name@bakery.com" required>
            </div>
            
            <div class="form-group">
                <label for="password"><i class="fa-solid fa-lock"></i> Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="btn btn-primary btn-block btn-glowing">
                <span>Sign In</span>
                <i class="fa-solid fa-arrow-right-to-bracket"></i>
            </button>
        </form>
        
        <div class="auth-footer">
            <p>Don't have an account? <a href="{{ url_for('register') }}">Register here</a></p>
        </div>
    </div>
</div>
{% endblock %}
